name: "Settings"
type: smoke
app:
  url: "http://localhost:5555"

recovery:
  - id: "session_expired"
    detect: "login,session,expired,sign in"
    recover:
      - action: "Complete OTP login for mal.nordstrom@gmail.com at http://localhost:5176"
        expect: "Redirected back to Gittan app"

cases:
  - id: "settings-001"
    name: "Update organization display name and save"
    steps:
      - action: "Navigate to the Settings page in the admin sidebar"
        expect: "Settings page is visible with organization name field and other org settings"
      - action: "Clear the organization display name field and type 'Bloomer AI Test', then click Save"
        expect: "Settings saved successfully. Success indicator (toast, banner, or confirmation message) appears"
      - action: "Verify the organization name shows 'Bloomer AI Test' on the settings page"
        expect: "Organization name field shows 'Bloomer AI Test'"

  - id: "settings-002"
    name: "Verify settings persistence after page reload"
    steps:
      - action: "Navigate to the Settings page. Note the current organization name value"
        expect: "Settings page loaded with current org name visible"
      - action: "Reload the page (navigate to Settings again)"
        expect: "Organization name field still shows the previously saved value — settings were persisted"
