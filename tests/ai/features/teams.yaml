name: "Teams"
type: smoke
app:
  url: "http://localhost:5555"

recovery:
  - id: "session_expired"
    detect: "login,session,expired,sign in"
    recover:
      - action: "Complete OTP login for mal.nordstrom@gmail.com at http://localhost:5176"
        expect: "Redirected back to Gittan app"

cases:
  - id: "teams-001"
    name: "Create a new team"
    steps:
      - action: "Navigate to the Teams page in the admin sidebar"
        expect: "Teams page is visible with a list of existing teams or empty state"
      - action: "Click the 'New team' or 'Create team' button"
        expect: "Team creation form or modal is shown with a field for team name"
      - action: "Fill in team name 'AI Test Team' and submit the form"
        expect: "Team is created and appears in the team list with name 'AI Test Team'"

  - id: "teams-002"
    name: "View team list"
    steps:
      - action: "Navigate to the Teams page"
        expect: "Team list is shown with at least one team visible. Each team shows its name"

  - id: "teams-003"
    name: "Team appears in sidebar navigation"
    steps:
      - action: "Navigate to the app dashboard and check the sidebar"
        expect: "Teams are listed in the sidebar navigation, clickable to navigate to the team view"
