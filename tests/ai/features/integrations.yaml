name: "Integrations"
type: smoke
app:
  url: "http://localhost:5555"

recovery:
  - id: "session_expired"
    detect: "login,session,expired,sign in"
    recover:
      - action: "Complete OTP login for mal.nordstrom@gmail.com at http://localhost:5176"
        expect: "Redirected back to Gittan app"

cases:
  - id: "integrations-001"
    name: "Integrations page loads"
    steps:
      - action: "Navigate to the Integrations page in the admin sidebar"
        expect: "Integrations page is visible with available integration options or configuration"

  - id: "integrations-002"
    name: "Slack integration section is present"
    steps:
      - action: "Navigate to the Integrations page and look for Slack integration"
        expect: "Slack integration section is visible with configuration fields or connect button"
