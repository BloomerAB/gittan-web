name: "Import from GitHub"
type: smoke
app:
  url: "http://localhost:5555"

recovery:
  - id: "session_expired"
    detect: "login,session,expired,sign in"
    recover:
      - action: "Complete OTP login for mal.nordstrom@gmail.com at http://localhost:5176"
        expect: "Redirected back to Gittan app"

cases:
  - id: "import-001"
    name: "Import page loads from admin sidebar"
    steps:
      - action: "Navigate to the admin sidebar and click 'Import from GitHub'"
        expect: "Import page loads with heading 'Import from GitHub', a description about migrating repos, and a form"

  - id: "import-002"
    name: "Import form has all required fields"
    steps:
      - action: "Navigate to the Import from GitHub page and examine the form"
        expect: "Form contains: a textarea for GitHub Repository URLs, GitHub Personal Access Token input (type password), Team dropdown selector, a checkbox for 'Update if repo already exists', and an Import Repository button"

  - id: "import-003"
    name: "URL textarea shows repo name previews"
    steps:
      - action: "Navigate to Import page and type two URLs in the textarea, one per line: 'https://github.com/BloomerAB/gittan-types' on the first line and 'https://github.com/BloomerAB/gittan-api' on the second line"
        expect: "Below the textarea, preview text appears showing both repo names: 'gittan-types' and 'gittan-api'. The button text changes to 'Import 2 Repositories'"

  - id: "import-004"
    name: "Token field has password masking and 1Password suppression"
    steps:
      - action: "Navigate to Import page and inspect the GitHub token field"
        expect: "Token input is of type password (masked) with autocomplete=off. Helper text below mentions 'repo' scope and token not being stored."

  - id: "import-005"
    name: "Team selector lists available teams"
    steps:
      - action: "Navigate to Import page and click on the Team dropdown"
        expect: "Dropdown shows available teams. If no teams exist, the dropdown is empty with only the 'Select a team' placeholder."
