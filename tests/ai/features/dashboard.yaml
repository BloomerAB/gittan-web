name: "Dashboard"
type: smoke
app:
  url: "http://localhost:5555"

recovery:
  - id: "session_expired"
    detect: "login,session,expired,sign in"
    recover:
      - action: "Complete OTP login for mal.nordstrom@gmail.com at http://localhost:5176"
        expect: "Redirected back to Gittan app"

cases:
  - id: "dashboard-001"
    name: "App dashboard loads after login"
    steps:
      - action: "Navigate to http://localhost:5555/app"
        expect: "Dashboard page loads. The left sidebar is visible with navigation links for teams and admin sections"
      - action: "Verify the sidebar contains links to Teams and Administration sections"
        expect: "Sidebar shows team names (if any) and an Administration section with admin links like Members, Settings, etc."

  - id: "dashboard-002"
    name: "Org selector is visible and shows current org"
    steps:
      - action: "Navigate to the app dashboard and look for the org selector or org name display"
        expect: "Current org name is visible somewhere in the header or sidebar"
