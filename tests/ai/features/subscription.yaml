name: "Subscription"
type: smoke
app:
  url: "http://localhost:5555"

recovery:
  - id: "session_expired"
    detect: "login,session,expired,sign in"
    recover:
      - action: "Complete OTP login for mal.nordstrom@gmail.com at http://localhost:5176"
        expect: "Redirected back to Gittan app"
  - id: "no_active_org"
    detect: "No active org,no org,select an org"
    recover:
      - action: "Navigate to the main app page and look for an org selector or org list. Select or create an org if needed."
        expect: "An org is now active and the page works normally"

cases:
  - id: "subscription-001"
    name: "Subscription page loads with current plan"
    steps:
      - action: "Navigate to the Subscription page in the admin sidebar"
        expect: "Subscription page shows current plan card with plan name, price, and description"

  - id: "subscription-002"
    name: "Three plan options are displayed and one is highlighted"
    steps:
      - action: "Navigate to the Subscription page and look at the Change Plan section"
        expect: "Three plan cards visible: Personal (Free), Starter (€39/mo), Team (€199/mo). The current plan card has a highlighted/accent border. The current plan button is disabled."

  - id: "subscription-003"
    name: "Plan change buttons are clickable and submit forms"
    steps:
      - action: "Navigate to Subscription page and inspect the non-active plan buttons (the ones without the highlighted border)"
        expect: "The non-active plan buttons are enabled (not disabled/greyed out) and are inside form elements with method POST. The active plan button is disabled."

  - id: "subscription-004"
    name: "Usage bars show CI minutes and storage"
    steps:
      - action: "Navigate to the Subscription page and examine the Usage section"
        expect: "Progress bars visible for CI Minutes and Storage, each showing used/limit values. No bars for members, teams, or repos — those are unlimited."

  - id: "subscription-005"
    name: "AI status shown in usage section"
    steps:
      - action: "Navigate to Subscription page and check the Usage section for AI status"
        expect: "An AI row is visible showing either 'Enabled' (violet text) or 'Not included — upgrade to Starter or Team'"

  - id: "subscription-006"
    name: "Spending cap section with adjustment"
    steps:
      - action: "Navigate to Subscription page and look for the Spending Cap section"
        expect: "Spending cap section visible showing current cap in EUR, description explaining that every €129 adds CI minutes and storage. A numeric input field for the cap amount and an Update button. If cap > 0, a breakdown showing how many blocks it equals and what extra capacity it provides."

  - id: "subscription-007"
    name: "Receipt email section with edit"
    steps:
      - action: "Navigate to Subscription page and look at the Receipts section"
        expect: "Receipt email field visible showing current email or 'Not set', with an Edit button. Text below clarifies this is for receipts, not invoices."
      - action: "Click the Edit button next to receipt email"
        expect: "Email input field appears with Save and Cancel buttons"
      - action: "Click Cancel"
        expect: "Input field disappears, returns to display mode"

  - id: "subscription-008"
    name: "Receipts list"
    steps:
      - action: "Navigate to Subscription page and look at the Receipts section below the receipt email"
        expect: "Either a table of past receipts with Date, Amount, and Download (PDF) columns, or text saying 'No receipts yet'"

  - id: "subscription-009"
    name: "Overall status badge"
    steps:
      - action: "Navigate to Subscription page and check the top-right area next to the Subscription heading"
        expect: "A status badge is visible (OK, Warning, Critical, or Blocked) indicating overall quota status"
